<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sigma.js — startups_graph.json</title>
    <link rel="icon" href="data:," />
    <style>
      :root {
        --bg: #0b0a09;
        --panel: #141210;
        --text: #f2efe9;
        --muted: #8a8478;
        --border: #2a2620;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; height: 100%;
        font-family: "Segoe UI", system-ui, sans-serif;
        background: var(--bg); color: var(--text);
      }
      #app { display: flex; flex-direction: column; height: 100%; }
      header {
        flex-shrink: 0; padding: 0.5rem 0.75rem;
        background: var(--panel); border-bottom: 1px solid var(--border);
        font-size: 0.82rem;
      }
      header h1 { margin: 0 0 0.35rem; font-size: 1rem; }
      .hint { color: var(--muted); font-size: 0.78rem; line-height: 1.45; }
      .toolbar {
        display: flex; flex-wrap: wrap; gap: 0.5rem 1rem;
        margin-top: 0.5rem; align-items: center;
      }
      .toolbar label {
        display: inline-flex; align-items: center; gap: 0.35rem; cursor: pointer;
      }
      .toolbar select, .toolbar button, .toolbar input[type="number"] {
        background: #1e1c18; color: var(--text);
        border: 1px solid var(--border); border-radius: 6px;
        padding: 0.3rem 0.55rem; font-size: 0.8rem; cursor: pointer;
      }
      .main {
        flex: 1; display: grid;
        grid-template-columns: 1fr 280px;
        min-height: 0;
      }
      #sigma-root {
        position: relative; background: #0b0a09;
        min-height: 0; overflow: hidden;
      }
      #side {
        border-left: 1px solid var(--border);
        background: var(--panel); overflow: auto; padding: 0.5rem 0.75rem;
      }
      #side h2 { margin: 0.25rem 0 0.5rem; font-size: 0.85rem; }
      #sideJson {
        font-size: 0.72rem; white-space: pre-wrap; word-break: break-word;
        color: var(--text); margin: 0;
      }
      #status {
        flex-shrink: 0; padding: 0.35rem 0.75rem; font-size: 0.75rem;
        color: var(--muted); border-top: 1px solid var(--border); background: var(--panel);
      }
      #status.err { color: #f66; }
      #legend {
        display: flex; flex-wrap: wrap; gap: 0.3rem 0.8rem;
        font-size: 0.72rem; margin-top: 0.4rem;
      }
      #legend span { display: inline-flex; align-items: center; gap: 0.25rem; }
      #legend i {
        display: inline-block; width: 10px; height: 10px; border-radius: 50%;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <header>
        <h1>Sigma.js (local) — grafo corpus</h1>
        <p class="hint">
          Motor <strong>sigma@3</strong> + <strong>graphology</strong> + <strong>forceatlas2</strong>.
          Licenças <strong>MIT</strong>. Dados: <code>../output/startups_graph.json</code>.
          Outros viewers:
          <a href="http://127.0.0.1:8765/graph-viewer/">vis-network 2D</a> ·
          <a href="http://127.0.0.1:8765/graph-viewer/force-view.html">3d-force-graph</a>
        </p>
        <div class="toolbar">
          <label title="Apenas nós company, sem arestas — mais fluido.">
            <input type="checkbox" id="companiesOnly" />
            Só empresas
          </label>
          <label>
            <input type="checkbox" id="filterReport" checked />
            Ocultar relatório
          </label>
          <label>
            <input type="checkbox" id="lightMode" checked />
            Ocultar category / location / macro
          </label>
          <label>
            <input type="checkbox" id="skipHeavyEdges" checked />
            Cortar arestas FROM_SOURCE / HAS_DATA_SOURCE
          </label>
          <label>
            Máx. arestas
            <select id="maxLinks">
              <option value="0">Sem limite</option>
              <option value="20000">20k</option>
              <option value="40000" selected>40k</option>
              <option value="80000">80k</option>
              <option value="120000">120k</option>
            </select>
          </label>
          <label>
            Iter. layout
            <input type="number" id="iterations" value="200" min="50" max="2000" step="50" style="width: 80px;" />
          </label>
          <button type="button" id="btnReload">Recarregar</button>
          <button type="button" id="btnFit">Encaixar</button>
        </div>
        <div id="legend"></div>
      </header>
      <div class="main">
        <div id="sigma-root"></div>
        <aside id="side">
          <h2>Nó selecionado</h2>
          <p id="sideEmpty" class="hint">Clique num nó para ver atributos.</p>
          <pre id="sideJson" hidden></pre>
        </aside>
      </div>
      <div id="status">A iniciar…</div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
